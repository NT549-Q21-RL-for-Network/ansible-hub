# =========================
# GRAFANA DATASOURCES
# =========================

- name: Ensure datasource directory exists
  file:
    path: "{{ grafana_provisioning_dir }}"
    state: directory
    owner: grafana
    group: grafana
    mode: "0755"
  tags: [grafana, grafana_datasource]

# -------------------------
# Prometheus
# -------------------------
- name: Provision Prometheus datasource
  template:
    src: prometheus-ds.yml.j2
    dest: "{{ grafana_provisioning_dir }}/prometheus.yml"
    owner: grafana
    group: grafana
    mode: "0644"
  notify: Restart Grafana
  when: grafana_enable_prometheus_datasource
  tags: [grafana, grafana_datasource, datasource_prometheus]

- name: Remove Prometheus datasource when disabled
  file:
    path: "{{ grafana_provisioning_dir }}/prometheus.yml"
    state: absent
  notify: Restart Grafana
  when: not grafana_enable_prometheus_datasource
  tags: [grafana, grafana_datasource, datasource_prometheus]

